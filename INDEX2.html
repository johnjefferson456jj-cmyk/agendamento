<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Moderno</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4 py-12">
    <div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl max-w-md w-full p-8 space-y-6 border border-white/50">
        <div class="text-center space-y-2">
            <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Agende seu Serviço</h1>
            <p class="text-gray-600">Preencha o formulário para marcar seu horário.</p>
        </div>
        <form id="appointmentForm" class="space-y-5">
            <div id="message" class="hidden p-4 rounded-xl border transition-all duration-300"></div>
            
            <div class="space-y-1">
                <label for="name" class="block text-sm font-medium text-gray-700">Nome</label>
                <input type="text" id="name" name="name" required class="mt-1 block w-full rounded-xl border border-gray-300 bg-white py-3 px-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 sm:text-sm placeholder-gray-400">
            </div>
            
            <div class="space-y-1">
                <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" name="email" required class="mt-1 block w-full rounded-xl border border-gray-300 bg-white py-3 px-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 sm:text-sm placeholder-gray-400">
            </div>
            
            <div class="space-y-1">
                <label for="service" class="block text-sm font-medium text-gray-700">Serviço</label>
                <select id="service" name="service" required class="mt-1 block w-full rounded-xl border border-gray-300 bg-white py-3 px-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 sm:text-sm">
                    <option value="">Selecione um serviço</option>
                    <option value="Corte de Cabelo">Corte de Cabelo</option>
                    <option value="Manicure">Manicure</option>
                    <option value="Pedicure">Pedicure</option>
                    <option value="Massagem">Massagem</option>
                </select>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label for="date" class="block text-sm font-medium text-gray-700">Data</label>
                    <input type="date" id="date" name="date" required class="mt-1 block w-full rounded-xl border border-gray-300 bg-white py-3 px-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 sm:text-sm">
                </div>
                <div class="space-y-1">
                    <label for="time" class="block text-sm font-medium text-gray-700">Hora</label>
                    <input type="time" id="time" name="time" required class="mt-1 block w-full rounded-xl border border-gray-300 bg-white py-3 px-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 sm:text-sm">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-4 px-6 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-0.5 transition-all duration-300 text-lg">
                Agendar Agora
            </button>
        </form>
    </div>
    
    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
        
        // Form submission
        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const btn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            
            // Show sending state
            btn.innerHTML = 'Enviando... <span class="ml-2 animate-spin">&cir;</span>';
            btn.disabled = true;
            message.classList.add('hidden');
            
            try {
                const response = await fetch('https://john5828k.app.n8n.cloud/webhook/6fa2fd35-89e8-4069-91f6-20889662e6be', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    message.textContent = 'Sucesso! Agendamento realizado com sucesso.';
                    message.className = 'block p-4 rounded-xl bg-green-100 border-green-300 text-green-800 font-medium mb-4 animate-pulse';
                    e.target.reset();
                } else {
                    throw new Error('Erro no servidor');
                }
            } catch (error) {
                message.textContent = 'Erro ao enviar. Tente novamente.';
                message.className = 'block p-4 rounded-xl bg-red-100 border-red-300 text-red-800 font-medium mb-4 animate-pulse';
            } finally {
                btn.innerHTML = 'Agendar Agora';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
